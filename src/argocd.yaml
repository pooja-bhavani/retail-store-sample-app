apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: car
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iemafzalhassan/retail-store-sample-app
    targetRevision: main
    path: src/cart/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iemafzalhassan/retail-store-sample-app
    targetRevision: main
    path: src/catalog/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-app
